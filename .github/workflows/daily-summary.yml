name: Daily summary

on:
  schedule:
    # 16:00 UTC = 21:30 IST (9:30 PM)
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the daily-summary endpoint
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            --max-time 300 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_URL"
